name: Auto-release on version bump

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from DESCRIPTION
        id: ver
        run: |
          v=$(grep '^Version:' DESCRIPTION | sed 's/Version:[[:space:]]*//')
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "tag=v$v"     >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check
        run: |
          if git rev-parse "${{ steps.ver.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true"  >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract NEWS section for this version
        if: steps.check.outputs.exists == 'false'
        run: |
          v="${{ steps.ver.outputs.version }}"
          awk -v marker="# Changes in version $v" '
            $0 == marker { in_section = 1; next }
            /^# Changes in version / && in_section { exit }
            in_section { print }
          ' NEWS.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "Release ${{ steps.ver.outputs.tag }}" > release_notes.md
          fi

      - name: Create tag and GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" \
            --title "${{ steps.ver.outputs.tag }}" \
            --notes-file release_notes.md \
            --target main
