name: security-scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 4 * * 1'   # weekly Monday 04:23 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:

  # ── 1. Dependency vulnerability scan via oysteR ────────────────────────
  dependency-audit:
    runs-on: ubuntu-latest
    name: Dependency vulnerability audit (oysteR)

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::oysteR
          needs: check

      - name: Scan dependencies for known vulnerabilities
        run: |
          audit <- oysteR::audit_installed_r_pkgs()
          vulns  <- audit[audit$no_of_vulnerabilities > 0, ]
          if (nrow(vulns) > 0) {
            cat("⚠ Vulnerable packages found:\n")
            print(vulns[, c("package", "version", "no_of_vulnerabilities")])
            quit(status = 1)
          } else {
            cat("✓ No known vulnerabilities in installed packages.\n")
          }
        shell: Rscript {0}

  # ── 2. Static analysis via lintr ───────────────────────────────────────
  static-analysis:
    runs-on: ubuntu-latest
    name: Static code analysis (lintr)

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::lintr
          needs: check

      - name: Lint R source files
        run: |
          lints <- lintr::lint_package(path = ".")
          if (length(lints) > 0) {
            cat("⚠ lintr found", length(lints), "issue(s):\n")
            print(lints)
            # Non-blocking: warn but do not fail the build
            # quit(status = 1)
          } else {
            cat("✓ No linting issues found.\n")
          }
        shell: Rscript {0}

      - name: Upload lintr results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lintr-results
          path: lintr_results.json
          if-no-files-found: ignore

  # ── 3. Dependency review on pull requests ──────────────────────────────
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: Dependency review (PR only)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  # ── 4. Secret scanning ────────────────────────────────────────────────
  secret-scan:
    runs-on: ubuntu-latest
    name: Secret & credential scan

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: trufflesecurity/trufflehog@v3
        with:
          extra_args: --only-verified
