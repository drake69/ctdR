name: BiocCheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bioccheck:
    runs-on: ubuntu-latest
    name: BiocCheck

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::BiocCheck
          needs: check

      - name: Run BiocCheck
        run: |
          result <- BiocCheck::BiocCheck(".")
          n_err  <- length(result$error)
          n_warn <- length(result$warning)
          n_note <- length(result$note)
          cat(sprintf(
            "BiocCheck summary: %d error(s), %d warning(s), %d note(s)\n",
            n_err, n_warn, n_note
          ))
          if (n_err > 0) {
            quit(status = 1)
          }
        shell: Rscript {0}
