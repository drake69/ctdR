name: BiocCheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bioccheck:
    runs-on: ubuntu-latest
    name: BiocCheck

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::BiocCheck
          needs: check

      - name: Run BiocCheck
        run: |
          result <- BiocCheck::BiocCheck(".")
          # Distinguish real code errors from transient Bioconductor
          # infrastructure failures (support site / mailing list lookups
          # that depend on bioconductor.org availability).
          infra_pattern <- "Unable to find your email in the Support Site"
          errs       <- result$error
          flaky_errs <- errs[grepl(infra_pattern, errs, fixed = TRUE)]
          real_errs  <- errs[!grepl(infra_pattern, errs, fixed = TRUE)]
          n_real  <- length(real_errs)
          n_flaky <- length(flaky_errs)
          n_warn  <- length(result$warning)
          n_note  <- length(result$note)
          cat(sprintf(
            paste0(
              "BiocCheck summary: %d code error(s) ",
              "[+ %d infra flake(s) skipped], ",
              "%d warning(s), %d note(s)\n"
            ),
            n_real, n_flaky, n_warn, n_note
          ))
          if (n_flaky > 0) {
            cat("\nSkipped infrastructure flakes:\n")
            cat(paste0("  - ", flaky_errs, collapse = "\n"), "\n")
          }
          if (n_real > 0) {
            cat("\nReal errors:\n")
            cat(paste0("  - ", real_errs, collapse = "\n"), "\n")
            quit(status = 1)
          }
        shell: Rscript {0}
