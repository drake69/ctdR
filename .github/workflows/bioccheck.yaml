name: BiocCheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bioccheck:
    runs-on: ubuntu-latest
    name: BiocCheck

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v6

      # Fast, version-independent guard: BiocCheck's check for tracked
      # system files exists only in devel (>= 1.49.x), so a stable
      # BiocCheck release would silently let .Rproj / .DS_Store through.
      # This step catches that class of issue regardless of BiocCheck version.
      - name: Forbid tracked system files
        run: |
          bad=$(git ls-files | grep -E '\.(Rproj|DS_Store)$' || true)
          if [ -n "$bad" ]; then
            echo "::error::Tracked system files found (must not be in git):"
            printf '  %s\n' "$bad"
            exit 1
          fi

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::BiocManager
          needs: check

      # Install BiocCheck from Bioconductor devel to match what the
      # Bioconductor package builder runs (e.g. job 4232 used 1.49.6).
      # The CRAN/release BiocCheck (1.48.x) lacks the tracked-system-files
      # check, which is exactly what we want to catch in CI.
      - name: Install BiocCheck (Bioconductor devel)
        run: |
          BiocManager::install(
            "BiocCheck",
            version = "devel",
            ask = FALSE,
            update = FALSE
          )
          installed <- as.character(packageVersion("BiocCheck"))
          required  <- "1.49.0"
          cat(
            "BiocCheck installed:", installed,
            "(required >=", required, ")\n"
          )
          # Fail-loud if the resolved BiocCheck is older than the version
          # that introduced the tracked-system-files check. Protects against
          # silent regressions if Bioconductor renames version = "devel" or
          # the mirror falls back to release.
          if (utils::compareVersion(installed, required) < 0) {
            stop(sprintf(
              paste0(
                "BiocCheck %s is below the required %s. ",
                "The tracked-system-files check requires devel."
              ),
              installed, required
            ))
          }
        shell: Rscript {0}

      - name: Run BiocCheckGitClone
        run: |
          gc <- BiocCheck::BiocCheckGitClone(".")
          n_err  <- length(gc$error)
          n_warn <- length(gc$warning)
          n_note <- length(gc$note)
          cat(sprintf(
            paste0(
              "BiocCheckGitClone summary: %d error(s), ",
              "%d warning(s), %d note(s)\n"
            ),
            n_err, n_warn, n_note
          ))
          if (n_err > 0) {
            cat("\nGitClone errors:\n")
            cat(paste0("  - ", gc$error, collapse = "\n"), "\n")
            quit(status = 1)
          }
        shell: Rscript {0}

      - name: Run BiocCheck
        run: |
          result <- BiocCheck::BiocCheck(".")
          # Distinguish real code errors from transient Bioconductor
          # infrastructure failures (support site / mailing list lookups
          # that depend on bioconductor.org availability).
          infra_pattern <- "Unable to find your email in the Support Site"
          errs       <- result$error
          flaky_errs <- errs[grepl(infra_pattern, errs, fixed = TRUE)]
          real_errs  <- errs[!grepl(infra_pattern, errs, fixed = TRUE)]
          n_real  <- length(real_errs)
          n_flaky <- length(flaky_errs)
          n_warn  <- length(result$warning)
          n_note  <- length(result$note)
          cat(sprintf(
            paste0(
              "BiocCheck summary: %d code error(s) ",
              "[+ %d infra flake(s) skipped], ",
              "%d warning(s), %d note(s)\n"
            ),
            n_real, n_flaky, n_warn, n_note
          ))
          if (n_flaky > 0) {
            cat("\nSkipped infrastructure flakes:\n")
            cat(paste0("  - ", flaky_errs, collapse = "\n"), "\n")
          }
          if (n_real > 0) {
            cat("\nReal errors:\n")
            cat(paste0("  - ", real_errs, collapse = "\n"), "\n")
            quit(status = 1)
          }
        shell: Rscript {0}
